services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: metro
      POSTGRES_USER: metro
      POSTGRES_PASSWORD: metro
    ports:
      - "5433:5432"
    volumes:
      - metro-postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metro -d metro"]
      interval: 5s
      timeout: 5s
      retries: 10

  data-generator:
    build:
      context: ./data-generator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8000
    ports:
      - "8000:8000"

  airflow-init:
    image: apache/airflow:2.10.5
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://metro:metro@postgres:5432/metro
      AIRFLOW__WEBSERVER__SECRET_KEY: metro-airflow-secret
      METRO_DATABASE_URL: postgresql://metro:metro@postgres:5432/metro
      METRO_GENERATOR_URL: http://data-generator:8000
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username airflow --password airflow --firstname Metro --lastname Admin --role Admin --email airflow@example.com || true"

  airflow-webserver:
    image: apache/airflow:2.10.5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      data-generator:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://metro:metro@postgres:5432/metro
      AIRFLOW__WEBSERVER__SECRET_KEY: metro-airflow-secret
      METRO_DATABASE_URL: postgresql://metro:metro@postgres:5432/metro
      METRO_GENERATOR_URL: http://data-generator:8000
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    ports:
      - "8081:8080"
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.10.5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      data-generator:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://metro:metro@postgres:5432/metro
      AIRFLOW__WEBSERVER__SECRET_KEY: metro-airflow-secret
      METRO_DATABASE_URL: postgresql://metro:metro@postgres:5432/metro
      METRO_GENERATOR_URL: http://data-generator:8000
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: scheduler

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      airflow-scheduler:
        condition: service_started
    environment:
      PORT: 3001
      DATABASE_URL: postgres://metro:metro@postgres:5432/metro
    expose:
      - "3001"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      YANDEX_MAPS_API_KEY: ${YANDEX_MAPS_API_KEY:-}
    ports:
      - "8080:80"

  tests:
    build:
      context: .
      dockerfile: tests/Dockerfile

volumes:
  metro-postgres-data:
